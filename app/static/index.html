<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cross-Asset Market Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=20260701-1" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">MB</div>
        <div class="brand-copy">
          <h1>Cross-Asset Market Board</h1>
          <p id="board-meta">Session initializing</p>
        </div>
      </div>

      <nav class="view-tabs" aria-label="Board view">
        <button class="active" type="button" data-view="daily">Daily</button>
        <button type="button" data-view="markets">Markets</button>
      </nav>

      <div class="topbar-actions">
        <div class="live-badge">
          <span id="connection-state" class="state-dot"></span>
          <span>Live Feed</span>
          <span id="live-freshness" class="live-freshness">Updated --</span>
        </div>
        <button id="refresh-button" class="toolbar-button" type="button">
          <i data-lucide="refresh-cw" aria-hidden="true"></i><span>Refresh</span>
        </button>
        <button id="editor-open" class="icon-button" type="button" aria-label="Edit universe" title="Edit universe">
          <i data-lucide="settings-2" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <div id="status-strip" class="status-strip connecting">
      <span class="status-pulse"></span>
      <span class="status-label">System</span>
      <span id="status-copy">Connecting to market data</span>
    </div>

    <main class="workspace">
      <section id="daily-view" class="view-panel" aria-label="Daily board">
        <div id="daily-board" class="daily-board">
          <section class="analytics-panel loading-panel" aria-label="Loading market read">
            <header class="panel-heading">
              <span class="skeleton-line title"></span>
              <span class="skeleton-line short"></span>
            </header>
            <div class="regime-grid loading-regime">
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
              <div class="loading-cell"><span></span><strong></strong><em></em></div>
            </div>
          </section>
          <div class="analytics-grid">
            <section class="analytics-panel loading-panel">
              <header class="panel-heading">
                <span class="skeleton-line title"></span>
                <span class="skeleton-line short"></span>
              </header>
              <div class="loading-blocks six">
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </section>
            <section class="analytics-panel loading-panel">
              <header class="panel-heading">
                <span class="skeleton-line title"></span>
                <span class="skeleton-line short"></span>
              </header>
              <div class="loading-list">
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </section>
          </div>
          <div class="analytics-grid equal">
            <section class="analytics-panel loading-panel">
              <header class="panel-heading"><span class="skeleton-line title"></span></header>
              <div class="loading-table"><span></span><span></span><span></span><span></span><span></span></div>
            </section>
            <section class="analytics-panel loading-panel">
              <header class="panel-heading"><span class="skeleton-line title"></span></header>
              <div class="loading-table"><span></span><span></span><span></span><span></span><span></span></div>
            </section>
          </div>
        </div>
      </section>

      <section id="markets-view" class="view-panel" aria-label="Markets" hidden>
        <div id="board" class="board board-loading" aria-live="polite">
          <section class="group-panel loading-panel">
            <div class="group-title"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="loading-rows"><span></span><span></span><span></span><span></span><span></span></div>
          </section>
          <section class="group-panel loading-panel">
            <div class="group-title"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="loading-rows"><span></span><span></span><span></span><span></span></div>
          </section>
          <section class="group-panel loading-panel">
            <div class="group-title"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="loading-rows"><span></span><span></span><span></span></div>
          </section>
        </div>
      </section>
    </main>

    <div id="editor-modal" class="modal" aria-hidden="true">
      <div class="editor-shell" role="dialog" aria-modal="true" aria-labelledby="editor-title">
        <div class="modal-header">
          <div>
            <h2 id="editor-title">Universe Editor</h2>
            <p id="editor-status"></p>
          </div>
          <button id="editor-close" class="icon-button" type="button" aria-label="Close editor">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>

        <div class="editor-grid">
          <form id="group-form" class="editor-form">
            <label>
              Sector / Theme
              <input id="group-name" name="name" autocomplete="off" required />
            </label>
            <button type="submit">Add Group</button>
          </form>

          <form id="asset-form" class="editor-form asset-form">
            <label>
              Group
              <select id="asset-group" name="group" required></select>
            </label>
            <label>
              Symbol
              <input id="asset-symbol" name="symbol" autocomplete="off" required />
            </label>
            <label>
              Type
              <select id="asset-type" name="type">
                <option value="equity">Equity</option>
                <option value="etf">ETF</option>
                <option value="crypto_perp">Crypto Perp</option>
              </select>
            </label>
            <label>
              Source
              <select id="asset-source" name="source">
                <option value="yahoo">Yahoo</option>
                <option value="hyperliquid">Hyperliquid</option>
                <option value="stooq">Stooq</option>
                <option value="finnhub">Finnhub</option>
              </select>
            </label>
            <label>
              Exchange
              <input id="asset-exchange" name="exchange" autocomplete="off" />
            </label>
            <label>
              Name
              <input id="asset-name" name="displayName" autocomplete="off" />
            </label>
            <button type="submit">Add Asset</button>
          </form>

          <div id="editor-list" class="editor-list"></div>
        </div>
      </div>
    </div>

    <div id="chart-modal" class="modal" aria-hidden="true">
      <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="chart-title">
        <div class="modal-header">
          <div>
            <h2 id="chart-title">Chart</h2>
            <p id="chart-subtitle"></p>
          </div>
          <button id="modal-close" class="icon-button" type="button" aria-label="Close chart">
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <div class="intervals" role="tablist" aria-label="Chart range">
          <button type="button" data-range="10m" data-interval="1m">10M</button>
          <button type="button" data-range="30m" data-interval="1m">30M</button>
          <button type="button" data-range="1h" data-interval="1m">1H</button>
          <button type="button" data-range="4h" data-interval="5m">4H</button>
          <button type="button" data-range="1d" data-interval="5m">1D</button>
          <button type="button" data-range="1w" data-interval="15m">1W</button>
          <button type="button" data-range="1mo" data-interval="1h">1M</button>
          <button type="button" data-range="3mo" data-interval="1d">3M</button>
          <button type="button" data-range="ytd" data-interval="1d" class="active">YTD</button>
        </div>
        <div id="chart-error" class="chart-error" hidden></div>
        <div id="chart" class="chart"></div>
        <section id="asset-profile" class="asset-profile" aria-live="polite">
          <div class="profile-empty">Select an asset to load profile data</div>
        </section>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/static/app.js?v=20260701-1" defer></script>
  </body>
</html>
